_schema-version: "3.1"
ID: tmapp
description: A simple CAP project.
version: 1.1.5
modules:
- name: ZTableMaintenance-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: table-maintenance-hdi
  - name: ups-btp-dwc-service
  - name: ZTableMaintenance-auth
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
  build-parameters:
    builder: npm-ci
- name: table-maintenance-hdi-deployer
  type: hdb
  path: gen/db
  requires:
  - name: table-maintenance-hdi
  - name: ups-btp-dwc-service
  parameters:
    buildpack: nodejs_buildpack
- name: ZTableMaintenance-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: ZTableMaintenance-repo-host
    parameters:
      service-key:
        name: ZTableMaintenance-repo-host-key
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - tmapp.zip
      name: tmapp
      target-path: resources/
- name: ZTableMaintenance-destination-content
  type: com.sap.application.content
  build-parameters:
    no-source: true
  requires:
  - name: ZTableMaintenance-destination-service
    parameters:
      content-target: true
  - name: ZTableMaintenance-repo-runtime
    parameters:
      service-key:
        name: ZTableMaintenance-repo-runtime-key
  - name: ZTableMaintenance-auth
    parameters:
      service-key:
        name: ZTableMaintenance-auth-key
  - name: srv-api
  - name: ZTableMaintenance-repo-host
    parameters:
      service-key:
        name: ZTableMaintenance-repo-host-key
  parameters:
    content:
      instance:
        existing_destinations_policy: update
        destinations:
        - Name: srv-api
          Authentication: OAuth2UserTokenExchange
          ServiceInstanceName: ZTableMaintenance-auth
          ServiceKeyName: ZTableMaintenance-auth-key
          URL: ~{srv-api/srv-url}
          HTML5.DynamicDestination: true
        - Name: tmapp
          ServiceInstanceName: ZTableMaintenance-html5-runtime-service
          ServiceKeyName: ZTableMaintenance-repo-runtime-key
          sap.cloud.service: tmapp
        - Name: tmapp-html5-runtime
          ServiceInstanceName: ZTableMaintenance-html5-service
          ServiceKeyName: ZTableMaintenance-repo-host-key
          sap.cloud.service: tmapp
- name: tmapp
  type: com.sap.application.content
  path: app/TableMaintenanceApp
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf

resources:
- name: table-maintenance-hdi
  type: org.cloudfoundry.existing-service
  parameters:
    service-name: table-maintenance-hdi
  properties:
    hdi-container-name: ${service-name}
- name: ups-btp-dwc-service
  type: org.cloudfoundry.existing-service
  parameters:
    service-name: DS_INTEGRATION
  properties:
    the-service-name: ${service-name}
- name: ZTableMaintenance-repo-host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: ZTableMaintenance-html5-service
    service-plan: app-host
- name: ZTableMaintenance-repo-runtime
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: ZTableMaintenance-html5-runtime-service
    service-plan: app-runtime
- name: ZTableMaintenance-destination-service
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: true
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          existing_destinations_policy: update
      version: 1.0.0
    service: destination
    service-name: ZTableMaintenance-destination-service
    service-plan: lite
- name: ZTableMaintenance-auth
  type: org.cloudfoundry.managed-service
  parameters:
    path: ./xs-security.json
    service: xsuaa
    service-name: ZTableMaintenance-auth
    service-plan: application
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
  sap.cloud.service: tmapp
build-parameters:
  before-all:
  - builder: custom
    commands:
    - npx -p @sap/cds-dk cds build --production
