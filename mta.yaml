_schema-version: "3.1"
ID: FarmTankCAPProxy
description: A simple CAP project.
version: 1.1.2
modules:
- name: FarmTankCAPProxy-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: training-hdi
  - name: ups-btp-dwc-service
  - name: FarmTankCAPProxy-auth
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
  build-parameters:
    builder: npm-ci
- name: training-hdi-deployer
  type: hdb
  path: gen/db
  requires:
  - name: training-hdi
  - name: ups-btp-dwc-service
  parameters:
    buildpack: nodejs_buildpack
- name: FarmTankCAPProxy-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: FarmTankCAPProxy-repo-host
    parameters:
      service-key:
        name: FarmTankCAPProxy-repo-host-key
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - plantlocationpage.zip
      name: plantlocationpage
      target-path: resources/
- name: FarmTankCAPProxy-destination-content
  type: com.sap.application.content
  build-parameters:
    no-source: true
  requires:
  - name: FarmTankCAPProxy-destination-service
    parameters:
      content-target: true
  - name: FarmTankCAPProxy-repo-runtime
    parameters:
      service-key:
        name: FarmTankCAPProxy-repo-runtime-key
  parameters:
    content:
      instance:
        existing_destinations_policy: update
        destinations:
        - Name: FarmTankCAPProxy-html5-runtime
          ServiceInstanceName: FarmTankCAPProxy-html5-runtime-service
          ServiceKeyName: FarmTankCAPProxy-repo-runtime-key
          sap.cloud.service: farmtankcapproxy.service
- name: plantlocationpage
  type: html5
  path: app/plantlocationpage
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
resources:
- name: training-hdi
  type: org.cloudfoundry.existing-service
  parameters:
    config:
      database_id: 116a3240-595d-4460-a2f9-f3ac166852f0
      schema: Training
    service: hana
    service-plan: hdi-shared
  properties:
    hdi-container-name: ${service-name}
- name: ups-btp-dwc-service
  type: org.cloudfoundry.existing-service
  parameters:
    service-name: DS_INTEGRATION
  properties:
    the-service-name: ${service-name}
- name: FarmTankCAPProxy-repo-host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: FarmTankCAPProxy-html5-service
    service-plan: app-host
- name: FarmTankCAPProxy-repo-runtime
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: FarmTankCAPProxy-html5-runtime-service
    service-plan: app-runtime
- name: FarmTankCAPProxy-destination-service
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: true
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          existing_destinations_policy: update
      version: 1.0.0
    service: destination
    service-name: FarmTankCAPProxy-destination-service
    service-plan: lite
- name: FarmTankCAPProxy-auth
  type: org.cloudfoundry.managed-service
  parameters:
    path: ./xs-security.json
    service: xsuaa
    service-name: FarmTankCAPProxy-auth
    service-plan: application
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
  - builder: custom
    commands:
    - npx -p @sap/cds-dk cds build --production
