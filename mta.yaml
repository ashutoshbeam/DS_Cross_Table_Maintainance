_schema-version: '3.1'
ID: FarmTankCAPProxy
version: 1.1.2
description: "A simple CAP project."
parameters:
  enable-parallel-deployments: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npx -p @sap/cds-dk cds build --production
modules:
  # --------------------- SERVER MODULE ------------------------
  - name: FarmTankCAPProxy-srv
    # --------------------- --------------------------------------
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api # required by consumers of CAP services (e.g. approuter)
        properties:
          srv-url: ${default-url}
    requires:
      - name: training-hdi
      - name: ups-btp-dwc-service
  # --------------------- DB MODULE ------------------------
  - name: training-hdi-deployer
    # --------------------------------------------------------
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: training-hdi
      - name: ups-btp-dwc-service
resources:
  - name: training-hdi
    type:  org.cloudfoundry.existing-service
    parameters:
      service: hana
      service-plan: hdi-shared
      config:
        database_id: 116a3240-595d-4460-a2f9-f3ac166852f0
        schema: Training
    properties:
      hdi-container-name: '${service-name}'
  - name: ups-btp-dwc-service
    type: org.cloudfoundry.existing-service
    parameters:
      service-name: DS_INTEGRATION
    properties:
      the-service-name: '${service-name}'