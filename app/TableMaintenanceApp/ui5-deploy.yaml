specVersion: "3.0"
metadata:
  name: tmapp
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: ui5-task-zipper
      afterTask: generateCachebusterInfo
      configuration:
        archiveName: tmapp
        relativePaths: true
        additionalFiles:
          - xs-app.json
