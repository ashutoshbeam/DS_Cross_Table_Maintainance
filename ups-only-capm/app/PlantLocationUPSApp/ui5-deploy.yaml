specVersion: "3.1"
metadata:
  name: plantlocationupsapp
type: application
framework:
  name: SAPUI5
  version: "1.146.0"
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: sap.ui.layout
builder:
  resources:
    excludes:
      - "/test/**"
  customTasks:
    - name: ui5-task-zipper
      afterTask: generateCachebusterInfo
      configuration:
        archiveName: PlantLocationUPSApp
